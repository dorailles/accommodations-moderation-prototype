name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Needs write access to push the built site to the gh-pages branch.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: github.repository != 'instructure/instui-sandbox-base'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Resolve deploy config
        run: |
          HASH=$(node -e "const fs=require('fs');const m=fs.readFileSync('src/sandbox.config.ts','utf8').match(/sandboxHash\s*=\s*'([^']*)'/);process.stdout.write(m&&m[1]?m[1]:'')")
          REPO="${{ github.event.repository.name }}"
          if [ -n "$HASH" ]; then
            echo "VITE_BASE_URL=/$REPO/$HASH/" >> "$GITHUB_ENV"
            echo "DEPLOY_DEST=$HASH" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_URL=/$REPO/" >> "$GITHUB_ENV"
            echo "DEPLOY_DEST=." >> "$GITHUB_ENV"
          fi

      - run: npm run build
        env:
          BASE_URL: ${{ env.VITE_BASE_URL }}

      - name: Assemble site
        run: |
          rm -rf _site
          mkdir -p _site
          # .nojekyll stops GitHub from running Jekyll (which would skip files like _assets).
          touch _site/.nojekyll
          if [ "$DEPLOY_DEST" = "." ]; then
            cp -R dist/. _site/
            # SPA fallback so deep links / refresh don't 404.
            cp dist/index.html _site/404.html
          else
            mkdir -p "_site/$DEPLOY_DEST"
            cp -R dist/. "_site/$DEPLOY_DEST/"
            cp dist/index.html "_site/$DEPLOY_DEST/404.html"
            # Blank landing page at the domain root so it doesn't 404.
            printf '<!doctype html><meta charset="utf-8">' > _site/index.html
          fi

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true

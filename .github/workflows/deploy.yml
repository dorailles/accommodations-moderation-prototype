name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Permissions for the official GitHub Actions Pages deployment flow.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.repository != 'instructure/instui-sandbox-base'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Resolve deploy config
        run: |
          HASH=$(node -e "const fs=require('fs');const m=fs.readFileSync('src/sandbox.config.ts','utf8').match(/sandboxHash\s*=\s*'([^']*)'/);process.stdout.write(m&&m[1]?m[1]:'')")
          REPO="${{ github.event.repository.name }}"
          if [ -n "$HASH" ]; then
            echo "VITE_BASE_URL=/$REPO/$HASH/" >> "$GITHUB_ENV"
            echo "DEPLOY_DEST=$HASH" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_URL=/$REPO/" >> "$GITHUB_ENV"
            echo "DEPLOY_DEST=." >> "$GITHUB_ENV"
          fi

      - run: npm run build
        env:
          BASE_URL: ${{ env.VITE_BASE_URL }}

      - name: Assemble Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          touch _site/.nojekyll
          if [ "$DEPLOY_DEST" = "." ]; then
            cp -R dist/. _site/
            cp dist/index.html _site/404.html
          else
            mkdir -p "_site/$DEPLOY_DEST"
            cp -R dist/. "_site/$DEPLOY_DEST/"
            cp dist/index.html "_site/$DEPLOY_DEST/404.html"
            printf '<!doctype html><meta charset="utf-8">' > _site/index.html
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
